name: Code quality checks

on:
  pull_request:
    branches: ['*']

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter="./packages/*" --filter="./apps/*"

      - name: Run lint
        run: pnpm run lint

      - name: Run lint:fsd
        run: pnpm run lint:fsd

      - name: Run typecheck
        run: pnpm run typecheck
