services:
  postgres:
    image: postgres:17-alpine
    container_name: video-prodaction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: video_prodaction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - video_prodaction_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_prodaction"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  video_prodaction_pgdata:
