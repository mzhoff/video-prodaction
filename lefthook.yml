pre-commit:
  parallel: true
  commands:
    lint-and-format:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    'lint commit message':
      run: pnpm exec commitlint --color=false --edit {1}

pre-push:
  commands:
    quality-checks:
      run: pnpm lint && pnpm lint:fsd && pnpm typecheck
